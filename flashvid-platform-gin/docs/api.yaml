openapi: 3.0.3
info:
  title: FlashVid Platform API
  description: |
    FlashVid Platform 短视频社交平台 RESTful API 文档

    ## 功能模块
    - 认证模块：用户注册、登录、Token刷新
    - 用户模块：用户信息管理、作品列表、喜欢列表、收藏列表
    - 关注模块：关注、取消关注、关注列表、粉丝列表
    - 视频模块：视频详情、发布视频、删除视频、搜索视频
    - 视频流模块：推荐流、关注流、附近流
    - 互动模块：点赞、收藏、分享
    - 评论模块：评论列表、发表评论、删除评论、点赞评论
    - 话题模块：话题列表、话题详情、话题视频列表、搜索话题
    - 消息模块：消息列表、对话消息、发送消息、标记已读、删除消息
    - 上传模块：获取上传凭证、上传文件
    - 音乐模块：音乐列表、搜索音乐

    ## 认证方式
    使用 JWT Token 认证，在请求头中添加：
    ```
    Authorization: Bearer <access_token>
    ```

    ## 错误码
    - 0: 成功
    - 10000-19999: 用户相关错误
    - 20000-29999: 视频相关错误
    - 30000-39999: 评论相关错误
    - 40000-49999: 系统错误
    - 50000-59999: 第三方服务错误
  version: 1.0.0
  contact:
    name: FlashVid Platform API Support
    email: support@flashvid.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

servers:
  - url: https://api.flashvid.com/api/v1
    description: 生产环境
  - url: https://api-staging.flashvid.com/api/v1
    description: 测试环境
  - url: http://localhost:8080/api/v1
    description: 本地开发环境

tags:
  - name: 认证
    description: 用户认证相关接口
  - name: 用户
    description: 用户信息管理
  - name: 关注
    description: 用户关注关系管理
  - name: 视频
    description: 视频相关操作
  - name: 视频流
    description: 视频推荐流
  - name: 互动
    description: 点赞、收藏、分享等互动操作
  - name: 评论
    description: 评论相关操作
  - name: 话题
    description: 话题相关操作
  - name: 消息
    description: 私信消息管理
  - name: 上传
    description: 文件上传
  - name: 音乐
    description: 音乐相关操作

paths:
  # ==================== 认证模块 ====================
  /auth/register:
    post:
      tags:
        - 认证
      summary: 用户注册
      description: 用户通过手机号和验证码注册账号
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
                - phone
                - code
              properties:
                username:
                  type: string
                  minLength: 4
                  maxLength: 32
                  description: 用户名，4-32字符
                  example: testuser
                password:
                  type: string
                  minLength: 6
                  maxLength: 20
                  description: 密码，6-20字符
                  example: password123
                phone:
                  type: string
                  pattern: '^1[3-9]\d{9}$'
                  description: 手机号（11位）
                  example: '13800138000'
                code:
                  type: string
                  minLength: 6
                  maxLength: 6
                  description: 短信验证码（6位）
                  example: '123456'
                birthday:
                  type: string
                  format: date
                  description: 生日（可选，格式：YYYY-MM-DD）
                  example: '2000-01-01'
                email:
                  type: string
                  format: email
                  description: 邮箱（可选）
                  example: test@example.com
      responses:
        '200':
          description: 注册成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Response'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          userId:
                            type: integer
                            format: int64
                            example: 123456
                          username:
                            type: string
                            example: testuser
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/login:
    post:
      tags:
        - 认证
      summary: 用户登录
      description: 用户通过用户名或手机号登录
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - account
                - password
              properties:
                account:
                  type: string
                  description: 账号（用户名或手机号）
                  example: testuser
                password:
                  type: string
                  description: 密码
                  example: password123
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Response'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          userId:
                            type: integer
                            format: int64
                            example: 123456
                          username:
                            type: string
                            example: testuser
                          nickname:
                            type: string
                            example: 测试用户
                          avatar:
                            type: string
                            format: uri
                            example: https://cdn.flashvid.com/avatar/123456.jpg
                          accessToken:
                            type: string
                            example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                          refreshToken:
                            type: string
                            example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags:
        - 认证
      summary: 刷新Token
      description: 使用refreshToken刷新accessToken
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
                  description: 刷新令牌
                  example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      responses:
        '200':
          description: 刷新成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Response'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          accessToken:
                            type: string
                            example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                          refreshToken:
                            type: string
                            example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '401':
          $ref: '#/components/responses/Unauthorized'


  # ==================== 用户模块 ====================
  /user/{id}:
    get:
      tags:
        - 用户
      summary: 获取用户信息
      description: 获取指定用户的详细信息（公开）
      operationId: getUserById
      parameters:
        - name: id
          in: path
          required: true
          description: 用户ID
          schema:
            type: integer
            format: int64
            example: 123456
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Response'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserProfile'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - BearerAuth: []

  /user/{id}/videos:
    get:
      tags:
        - 用户
      summary: 获取用户作品列表
      description: 获取指定用户发布的视频列表（公开）
      operationId: getUserVideos
      parameters:
        - name: id
          in: path
          required: true
          description: 用户ID
          schema:
            type: integer
            format: int64
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Response'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          videos:
                            type: array
                            items:
                              $ref: '#/components/schemas/Video'
                          pagination:
                            $ref: '#/components/schemas/Pagination'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - BearerAuth: []

  /user/profile:
    put:
      tags:
        - 用户
      summary: 更新用户信息
      description: 更新当前登录用户的个人信息
      operationId: updateUserProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nickname:
                  type: string
                  maxLength: 32
                  example: 新昵称
                avatar:
                  type: string
                  format: uri
                  example: https://cdn.flashvid.com/avatar/new.jpg
                bio:
                  type: string
                  maxLength: 200
                  example: 这是我的个人简介
                gender:
                  type: integer
                  enum: [0, 1, 2]
                  description: 性别 0-未知 1-男 2-女
                  example: 1
                birthday:
                  type: string
                  format: date
                  example: '2000-01-01'
                city:
                  type: string
                  example: 深圳
                email:
                  type: string
                  format: email
                  example: test@example.com
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Response'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserProfile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
        - BearerAuth: []

  /user/profile/likes:
    get:
      tags:
        - 用户
      summary: 获取我的点赞列表
      description: 获取当前登录用户的点赞视频列表（私有）
      operationId: getMyLikes
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Response'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          videos:
                            type: array
                            items:
                              $ref: '#/components/schemas/Video'
                          pagination:
                            $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
        - BearerAuth: []

  /user/profile/favorites:
    get:
      tags:
        - 用户
      summary: 获取我的收藏列表
      description: 获取当前登录用户的收藏视频列表（私有）
      operationId: getMyFavorites
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Response'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          videos:
                            type: array
                            items:
                              $ref: '#/components/schemas/Video'
                          pagination:
                            $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
        - BearerAuth: []


  # ==================== 关注模块 ====================
  /users/{id}/follow:
    post:
      tags:
        - 关注
      summary: 关注用户
      description: 关注指定用户
      operationId: followUser
      parameters:
        - name: id
          in: path
          required: true
          description: 用户ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 关注成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Response'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          is_following:
                            type: boolean
                            example: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: 已经关注该用户
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
      security:
        - BearerAuth: []

    delete:
      tags:
        - 关注
      summary: 取消关注
      description: 取消关注指定用户
      operationId: unfollowUser
      parameters:
        - name: id
          in: path
          required: true
          description: 用户ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 取消关注成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Response'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          is_following:
                            type: boolean
                            example: false
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - BearerAuth: []

  /users/{id}/following:
    get:
      tags:
        - 关注
      summary: 获取关注列表
      description: 获取用户关注的用户列表
      operationId: getUserFollowing
      parameters:
        - name: id
          in: path
          required: true
          description: 用户ID
          schema:
            type: integer
            format: int64
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Response'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          list:
                            type: array
                            items:
                              $ref: '#/components/schemas/UserProfile'
                          pagination:
                            $ref: '#/components/schemas/Pagination'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - BearerAuth: []

  /users/{id}/followers:
    get:
      tags:
        - 关注
      summary: 获取粉丝列表
      description: 获取用户的粉丝列表
      operationId: getUserFollowers
      parameters:
        - name: id
          in: path
          required: true
          description: 用户ID
          schema:
            type: integer
            format: int64
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Response'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          list:
                            type: array
                            items:
                              $ref: '#/components/schemas/UserProfile'
                          pagination:
                            $ref: '#/components/schemas/Pagination'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - BearerAuth: []


  # ==================== 视频流模块 ====================
  /feed/recommend:
    get:
      tags:
        - 视频流
      summary: 获取推荐视频流
      description: 获取个性化推荐的视频列表
      operationId: getRecommendFeed
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Count'
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Response'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          list:
                            type: array
                            items:
                              $ref: '#/components/schemas/Video'
                          cursor:
                            type: string
                            description: 下一页游标
                            example: next_cursor_token
                          has_more:
                            type: boolean
                            description: 是否还有更多数据
                            example: true
      security:
        - BearerAuth: []

  /feed/following:
    get:
      tags:
        - 视频流
      summary: 获取关注视频流
      description: 获取关注用户发布的视频列表
      operationId: getFollowingFeed
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Count'
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Response'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          list:
                            type: array
                            items:
                              $ref: '#/components/schemas/Video'
                          cursor:
                            type: string
                            example: next_cursor_token
                          has_more:
                            type: boolean
                            example: true
      security:
        - BearerAuth: []

  /feed/nearby:
    get:
      tags:
        - 视频流
      summary: 获取附近视频流
      description: 获取附近用户发布的视频列表
      operationId: getNearbyFeed
      parameters:
        - name: latitude
          in: query
          required: true
          description: 纬度
          schema:
            type: number
            format: double
            example: 22.5431
        - name: longitude
          in: query
          required: true
          description: 经度
          schema:
            type: number
            format: double
            example: 114.0579
        - name: radius
          in: query
          description: 半径（公里），默认10
          schema:
            type: integer
            default: 10
            example: 10
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Count'
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Response'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          list:
                            type: array
                            items:
                              $ref: '#/components/schemas/Video'
                          cursor:
                            type: string
                            example: next_cursor_token
                          has_more:
                            type: boolean
                            example: true
      security:
        - BearerAuth: []


  # ==================== 视频模块 ====================
  /videos:
    post:
      tags:
        - 视频
      summary: 发布视频
      description: 发布新视频
      operationId: publishVideo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - cover_url
                - video_url
                - duration
                - width
                - height
                - file_size
              properties:
                title:
                  type: string
                  maxLength: 100
                  description: 视频标题
                  example: 我的第一个短视频
                description:
                  type: string
                  maxLength: 500
                  description: 视频描述
                  example: 这是一个测试视频
                cover_url:
                  type: string
                  format: uri
                  description: 封面URL（已上传）
                  example: https://cdn.flashvid.com/cover/123.jpg
                video_url:
                  type: string
                  format: uri
                  description: 视频URL（已上传）
                  example: https://cdn.flashvid.com/video/123.mp4
                duration:
                  type: integer
                  description: 视频时长（秒）
                  example: 30
                width:
                  type: integer
                  description: 视频宽度
                  example: 1080
                height:
                  type: integer
                  description: 视频高度
                  example: 1920
                file_size:
                  type: integer
                  format: int64
                  description: 文件大小（字节）
                  example: 5242880
                music_id:
                  type: integer
                  format: int64
                  description: 音乐ID
                  example: 456
                music_name:
                  type: string
                  description: 背景音乐名称
                  example: 背景音乐
                city:
                  type: string
                  description: 城市
                  example: 深圳
                location:
                  type: string
                  description: 具体位置
                  example: 南山区
                latitude:
                  type: number
                  format: double
                  description: 纬度
                  example: 22.5431
                longitude:
                  type: number
                  format: double
                  description: 经度
                  example: 114.0579
                topic_ids:
                  type: array
                  items:
                    type: integer
                    format: int64
                  description: 话题ID列表
                  example: [1, 2, 3]
      responses:
        '200':
          description: 发布成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Response'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          video_id:
                            type: integer
                            format: int64
                            example: 12345
                          status:
                            type: integer
                            description: 1-审核中
                            example: 1
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
      security:
        - BearerAuth: []

  /videos/{id}:
    get:
      tags:
        - 视频
      summary: 获取视频详情
      description: 获取指定视频的详细信息
      operationId: getVideoById
      parameters:
        - name: id
          in: path
          required: true
          description: 视频ID
          schema:
            type: integer
            format: int64
            example: 12345
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Response'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/VideoDetail'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - BearerAuth: []

    delete:
      tags:
        - 视频
      summary: 删除视频
      description: 删除自己发布的视频
      operationId: deleteVideo
      parameters:
        - name: id
          in: path
          required: true
          description: 视频ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
        '401':
