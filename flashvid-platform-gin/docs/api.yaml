    get:
      tags:
        - 音乐
      summary: 获取音乐列表
      description: 获取热门音乐列表
      operationId: getMusicList
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: sort
          in: query
          description: 排序方式
          schema:
            type: string
            enum: [hot, latest]
            default: hot
            example: hot
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Response'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          list:
                            type: array
                            items:
                              $ref: '#/components/schemas/Music'
                          pagination:
                            $ref: '#/components/schemas/Pagination'
      security:
        - BearerAuth: []

  /music/search:
    get:
      tags:
        - 音乐
      summary: 搜索音乐
      description: 根据关键词搜索音乐
      operationId: searchMusic
      parameters:
        - name: keyword
          in: query
          required: true
          description: 搜索关键词
          schema:
            type: string
            example: 告白气球
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 搜索成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Response'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          list:
                            type: array
                            items:
                              $ref: '#/components/schemas/Music'
                          pagination:
                            $ref: '#/components/schemas/Pagination'
      security:
        - BearerAuth: []


components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Token 认证，格式：Bearer <token>

  parameters:
    Page:
      name: page
      in: query
      description: 页码，从1开始
      schema:
        type: integer
        minimum: 1
        default: 1
        example: 1

    PageSize:
      name: pageSize
      in: query
      description: 每页数量
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
        example: 20

    Cursor:
      name: cursor
      in: query
      description: 游标，用于分页
      schema:
        type: string
        example: next_cursor_token

    Count:
      name: count
      in: query
      description: 返回数量
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
        example: 10

    Sort:
      name: sort
      in: query
      description: 排序方式
      schema:
        type: string
        enum: [latest, popular]
        default: latest
        example: latest

  schemas:
    Response:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          description: 响应码，0表示成功
          example: 0
        message:
          type: string
          description: 响应消息
          example: success
        data:
          type: object
          nullable: true
          description: 响应数据

    Pagination:
      type: object
      properties:
        page:
          type: integer
          description: 当前页码
          example: 1
        pageSize:
          type: integer
          description: 每页数量
          example: 20
        total:
          type: integer
          format: int64
          description: 总记录数
          example: 100
        totalPages:
          type: integer
          description: 总页数
          example: 5

    UserProfile:
      type: object
      properties:
        userId:
          type: integer
          format: int64
          description: 用户ID
          example: 123456
        username:
          type: string
          description: 用户名
          example: testuser
        nickname:
          type: string
          description: 昵称
          example: 测试用户
        avatar:
          type: string
          format: uri
          description: 头像URL
          example: https://cdn.flashvid.com/avatar/123456.jpg
        bio:
          type: string
          description: 个人简介
          example: 这是我的个人简介
        gender:
          type: string
          description: 性别 0-未知 1-男 2-女
          example: '1'
        birthday:
          type: string
          format: date
          description: 生日
          example: '2000-01-01'
        city:
          type: string
          description: 城市
          example: 深圳
        phone:
          type: string
          description: 手机号
          example: '13800138000'
        email:
          type: string
          format: email
          description: 邮箱
          example: test@example.com
        followersCount:
          type: integer
          description: 粉丝数
          example: 1000
        followingCount:
          type: integer
          description: 关注数
          example: 500
        videosCount:
          type: integer
          description: 发布视频数
          example: 50
        likesCount:
          type: integer
          description: 获赞数
          example: 10000
        createdAt:
          type: string
          format: date-time
          description: 注册时间
          example: '2024-01-01T12:00:00Z'


    Video:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: 视频ID
          example: 12345
        title:
          type: string
          description: 视频标题
          example: 我的第一个短视频
        description:
          type: string
          description: 视频描述
          example: 这是一个测试视频
        coverUrl:
          type: string
          format: uri
          description: 封面URL
          example: https://cdn.flashvid.com/cover/12345.jpg
        videoUrl:
          type: string
          format: uri
          description: 视频URL
          example: https://cdn.flashvid.com/video/12345.mp4
        duration:
          type: integer
          description: 视频时长（秒）
          example: 30
        width:
          type: integer
          description: 视频宽度
          example: 1080
        height:
          type: integer
          description: 视频高度
          example: 1920
        musicId:
          type: integer
          format: int64
          description: 背景音乐ID
          example: 456
        city:
          type: string
          description: 城市
          example: 深圳
        topics:
          type: array
          items:
            type: string
          description: 话题标签
          example: ['旅行', '美食']
        author:
          type: object
          description: 作者信息
          properties:
            id:
              type: integer
              format: int64
              example: 123
            username:
              type: string
              example: author
            nickname:
              type: string
              example: 作者
            avatar:
              type: string
              format: uri
              example: https://cdn.flashvid.com/avatar/123.jpg
        stats:
          type: object
          description: 统计信息
          properties:
            viewCount:
              type: integer
              description: 播放数
              example: 10000
            likeCount:
              type: integer
              description: 点赞数
              example: 1000
            commentCount:
              type: integer
              description: 评论数
              example: 100
            shareCount:
              type: integer
              description: 分享数
              example: 50
            favoriteCount:
              type: integer
              description: 收藏数
              example: 200
        publishedAt:
          type: string
          description: 发布时间（格式：2006-01-02 15:04:05）
          example: '2024-01-01 12:00:00'

    VideoDetail:
      allOf:
        - $ref: '#/components/schemas/Video'
        - type: object
          properties:
            music_id:
              type: integer
              format: int64
              description: 音乐ID
              example: 456
            location:
              type: string
              description: 具体位置
              example: 南山区
            topics:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: integer
                    format: int64
                    example: 1
                  name:
                    type: string
                    example: 旅行
            published_at:
              type: string
              format: date-time
              description: 发布时间
              example: '2024-01-01T12:00:00Z'


    Comment:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: 评论ID
          example: 789
        content:
          type: string
          description: 评论内容
          example: 这个视频太棒了！
        user:
          type: object
          description: 评论用户
          properties:
            id:
              type: integer
              format: int64
              example: 123
            username:
              type: string
              example: commenter
            nickname:
              type: string
              example: 评论者
            avatar:
              type: string
              format: uri
              example: https://cdn.flashvid.com/avatar/123.jpg
        like_count:
          type: integer
          format: int64
          description: 点赞数
          example: 10
        reply_count:
          type: integer
          format: int64
          description: 回复数
          example: 2
        is_liked:
          type: boolean
          description: 是否已点赞
          example: false
        is_author:
          type: boolean
          description: 是否为视频作者
          example: false
        replies:
          type: array
          description: 回复列表
          items:
            type: object
            properties:
              id:
                type: integer
                format: int64
                example: 790
              content:
                type: string
                example: 回复内容
              user:
                type: object
                properties:
                  id:
                    type: integer
                    format: int64
                    example: 456
                  username:
                    type: string
                    example: replier
                  nickname:
                    type: string
                    example: 回复者
                  avatar:
                    type: string
                    format: uri
                    example: https://cdn.flashvid.com/avatar/456.jpg
              reply_to_user:
                type: object
                nullable: true
                properties:
                  id:
                    type: integer
                    format: int64
                    example: 123
                  nickname:
                    type: string
                    example: 评论者
              like_count:
                type: integer
                format: int64
                example: 5
              is_liked:
                type: boolean
                example: false
              created_at:
                type: string
                format: date-time
                example: '2024-01-01T12:05:00Z'
        created_at:
          type: string
          format: date-time
          description: 评论时间
          example: '2024-01-01T12:00:00Z'

    Topic:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: 话题ID
          example: 1
        name:
          type: string
          description: 话题名称
          example: 旅行
        description:
          type: string
          description: 话题描述
          example: 分享你的旅行故事
        cover_url:
          type: string
          format: uri
          description: 话题封面
          example: https://cdn.flashvid.com/topic/1.jpg
        view_count:
          type: integer
          format: int64
          description: 浏览量
          example: 1000000
        video_count:
          type: integer
          format: int64
          description: 视频数量
          example: 5000
        created_at:
          type: string
          format: date-time
          description: 创建时间
          example: '2024-01-01T12:00:00Z'

    Message:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: 消息ID
          example: 1
        from_user:
          type: object
          description: 发送用户
          properties:
            id:
              type: integer
              format: int64
              example: 123
            username:
              type: string
              example: sender
            nickname:
              type: string
              example: 发送者
            avatar:
              type: string
              format: uri
              example: https://cdn.flashvid.com/avatar/123.jpg
        message_type:
          type: integer
          description: 消息类型 1-文本 2-图片 3-视频
          enum: [1, 2, 3]
          example: 1
        content:
          type: string
          description: 消息内容
          example: 你好，很高兴认识你
        media_url:
          type: string
          format: uri
          description: 媒体URL
          example: ''
        is_read:
          type: boolean
          description: 是否已读
          example: false
        created_at:
          type: string
          format: date-time
          description: 发送时间
          example: '2024-01-01T12:00:00Z'

    Music:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: 音乐ID
          example: 456
        name:
          type: string
          description: 音乐名称
          example: 告白气球
        artist:
          type: string
          description: 艺术家
          example: 周杰伦
        cover_url:
          type: string
          format: uri
          description: 封面URL
          example: https://cdn.flashvid.com/music/456.jpg
        music_url:
          type: string
          format: uri
          description: 音乐URL
          example: https://cdn.flashvid.com/music/456.mp3
        duration:
          type: integer
          description: 音乐时长（秒）
          example: 200
        use_count:
          type: integer
          format: int64
          description: 使用次数
          example: 10000
        created_at:
          type: string
          format: date-time
          description: 创建时间
          example: '2024-01-01T12:00:00Z'


  responses:
    BadRequest:
      description: 请求参数错误
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/Response'
              - type: object
                properties:
                  code:
                    example: 40000
                  message:
                    example: 请求参数错误
                  data:
                    example: null

    Unauthorized:
      description: 未登录或Token失效
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/Response'
              - type: object
                properties:
                  code:
                    example: 40001
                  message:
                    example: 未登录或Token失效
                  data:
                    example: null

    Forbidden:
      description: 无权限访问
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/Response'
              - type: object
                properties:
                  code:
                    example: 40003
                  message:
                    example: 无权限访问
                  data:
                    example: null

    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/Response'
              - type: object
                properties:
                  code:
                    example: 40004
                  message:
                    example: 资源不存在
                  data:
                    example: null

    ValidationError:
      description: 请求参数验证失败
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/Response'
              - type: object
                properties:
                  code:
                    example: 42200
                  message:
                    example: 请求参数验证失败
                  data:
                    type: object
                    properties:
                      errors:
                        type: array
                        items:
                          type: object
                          properties:
                            field:
                              type: string
                              example: username
                            message:
                              type: string
                              example: 用户名不能为空

    TooManyRequests:
      description: 请求过于频繁
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/Response'
              - type: object
                properties:
                  code:
                    example: 42900
                  message:
                    example: 请求过于频繁，请稍后再试
                  data:
                    type: object
                    properties:
                      retry_after:
                        type: integer
                        description: 重试间隔（秒）
                        example: 60

    InternalServerError:
      description: 服务器内部错误
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/Response'
              - type: object
                properties:
                  code:
                    example: 50000
                  message:
                    example: 服务器内部错误
                  data:
                    example: null

